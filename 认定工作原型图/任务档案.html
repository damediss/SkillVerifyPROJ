<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务档案 - 认定工作流程</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #1f2937; }
        .container { display: flex; height: 100vh; }
        .sidebar {
            width: 220px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; flex-shrink: 0; overflow-y: auto;
        }
        .sidebar-logo { padding: 0 16px 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; }
        .sidebar-logo h2 { font-size: 16px; font-weight: 600; }
        .sidebar-logo p { font-size: 12px; color: #8c8c8c; margin-top: 4px; }
        .sidebar-item {
            padding: 12px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none;
        }
        .sidebar-item:hover { background: #f5f5f5; }
        .sidebar-item.active { background: #1890ff; color: #fff; }
        .sidebar-item-content { display: flex; align-items: center; gap: 10px; }
        .sidebar-icon { font-size: 16px; width: 20px; text-align: center; }
        .sidebar-arrow { font-size: 12px; color: #bfbfbf; transition: transform 0.3s; }
        .sidebar-item.expanded .sidebar-arrow { transform: rotate(90deg); }
        .sidebar-sublist { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .sidebar-sublist.expanded { max-height: 1200px; }
        .sidebar-subitem {
            padding: 10px 16px 10px 46px; cursor: pointer; font-size: 14px; color: #595959;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-subitem:hover { background: #f5f5f5; color: #1890ff; }
        .sidebar-subitem.active { background: rgba(24,144,255,0.2); color: #1890ff; border-right: 3px solid #1890ff; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 64px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .header h1 { font-size: 18px; }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
        .breadcrumb a { color: #1890ff; text-decoration: none; }
        .card {
            background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; margin-bottom: 8px; }
        .card p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 16px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
        .field select {
            width: 100%; max-width: 420px; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px;
        }
        .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
        .link-card {
            border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px; text-decoration: none; color: #1f2937;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .link-card:hover { border-color: #1890ff; box-shadow: 0 4px 12px rgba(24,144,255,0.15); }
        .link-card h3 { font-size: 15px; margin-bottom: 6px; }
        .link-card span { font-size: 13px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-logo"><h2>认定工作流程</h2><p>系统原型</p></div>
        <div class="sidebar-item" onclick="window.location.href='数据面板.html'">
            <div class="sidebar-item-content"><span class="sidebar-icon">📊</span><span>数据面板</span></div>
        </div>
        <div class="sidebar-item expanded" id="projectMenu">
            <div class="sidebar-item-content"><span class="sidebar-icon">📁</span><span>任务管理</span></div>
            <span class="sidebar-arrow">▶</span>
        </div>
        <div class="sidebar-sublist expanded" id="projectSubmenu">
            <div class="sidebar-subitem" onclick="window.location.href='项目管理首页.html'"><span>📋</span> 任务准备</div>
            <div class="sidebar-subitem" onclick="window.location.href='我要下单.html'"><span>🛒</span> 我要下单</div>
            <div class="sidebar-subitem active" id="taskArchiveEntry" onclick="window.location.href='任务档案.html'"><span>📦</span> 任务档案</div>
        </div>
        <div class="sidebar-item" id="processMenu">
            <div class="sidebar-item-content"><span class="sidebar-icon">📋</span><span>认定流程</span></div>
            <span class="sidebar-arrow">▶</span>
        </div>
        <div class="sidebar-sublist" id="processSubmenu"></div>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>任务档案</h1>
            <div style="font-size:14px;color:#666;">👤 管理员</div>
        </div>
        <div class="content">
            <div class="breadcrumb">
                <a href="数据面板.html">首页</a><span>/</span><span>任务管理</span><span>/</span><span>任务档案</span>
            </div>
            <div class="card">
                <h2>先选任务，再查历史材料</h2>
                <p>考试材料、考场资料、考生资料均按「历史任务」归档。请选择下方任务后，进入对应模块查看该任务下的归档内容（原型通过 URL 参数传递任务编号）。</p>
                <div class="field">
                    <label for="taskSelect">当前任务</label>
                    <select id="taskSelect"></select>
                </div>
                <div class="link-grid" id="linkGrid"></div>
            </div>
        </div>
    </div>
</div>
<script>
    const TASKS = [
        { code: 'RD-2026-001', name: '2026年职业技能认定项目' },
        { code: 'RD-2026-002', name: '2026年高级技师认定项目' },
        { code: 'RD-2026-003', name: '2026年第二季度认定项目' },
        { code: 'RD-2025-004', name: '2025年第四季度认定项目' }
    ];

    function qs() {
        const u = new URLSearchParams(window.location.search);
        return u.get('task') || localStorage.getItem('currentProjectCode') || TASKS[0].code;
    }

    function render() {
        const sel = document.getElementById('taskSelect');
        sel.innerHTML = TASKS.map(t => `<option value="${t.code}">${t.code} — ${t.name}</option>`).join('');
        sel.value = qs();
        sel.addEventListener('change', () => {
            localStorage.setItem('currentProjectCode', sel.value);
            localStorage.setItem('currentProjectName', TASKS.find(x => x.code === sel.value)?.name || '');
            renderLinks();
            history.replaceState(null, '', '任务档案.html?task=' + encodeURIComponent(sel.value));
        });
        renderLinks();
    }

    function renderLinks() {
        const code = document.getElementById('taskSelect').value;
        const grid = document.getElementById('linkGrid');
        const q = '?task=' + encodeURIComponent(code);
        grid.innerHTML = `
            <a class="link-card" href="考试材料.html${q}"><h3>📝 考试材料</h3><span>历史任务 — 试卷与考务材料</span></a>
            <a class="link-card" href="考场资料.html${q}"><h3>🏫 考场资料</h3><span>历史任务 — 考场与场次信息</span></a>
            <a class="link-card" href="考生资料.html${q}"><h3>👤 考生资料</h3><span>历史任务 — 名册与附件</span></a>
            <a class="link-card" href="任务档案-考评员资料.html${q}"><h3>👷 考评员资料</h3><span>历史任务 — 实操考试材料与考评员信息</span></a>
        `;
    }

    document.addEventListener('DOMContentLoaded', render);
</script>
<script src="common.js"></script>
</body>
</html>
