<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实操考试现场工作检查清单 - 认定工作流程</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 220px; background-color: #ffffff; color: #1f2937; border-right: 1px solid #e8e8e8; box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04); padding: 16px 0; flex-shrink: 0; overflow-y: auto; }
        .sidebar-logo { padding: 0 16px 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; }
        .sidebar-logo h2 { font-size: 16px; font-weight: 600; }
        .sidebar-logo p { font-size: 12px; color: #8c8c8c; margin-top: 4px; }
        .sidebar-item { padding: 12px 16px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: space-between; user-select: none; }
        .sidebar-item:hover { background-color: #f5f5f5; }
        .sidebar-item.active { background-color: #1890ff; color: #ffffff; }
        .sidebar-item-content { display: flex; align-items: center; gap: 10px; }
        .sidebar-icon { font-size: 16px; width: 20px; text-align: center; }
        .sidebar-arrow { font-size: 12px; transition: transform 0.3s; color: #bfbfbf; }
        .sidebar-item.expanded .sidebar-arrow { transform: rotate(90deg); }
        .sidebar-sublist { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .sidebar-sublist.expanded { max-height: 1200px; }
        .sidebar-subitem { padding: 10px 16px 10px 46px; cursor: pointer; transition: all 0.3s; font-size: 14px; color: #595959; display: flex; align-items: center; gap: 8px; }
        .sidebar-subitem:hover { background-color: #f5f5f5; color: #1890ff; }
        .sidebar-subitem.active { background-color: rgba(24, 144, 255, 0.2); color: #1890ff; border-right: 3px solid #1890ff; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 64px; background-color: white; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        .header h1 { font-size: 18px; color: #1f2937; }
        .header-user { display: flex; align-items: center; gap: 12px; color: #666; font-size: 14px; }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
        .breadcrumb a { color: #1890ff; text-decoration: none; }
        .breadcrumb a:hover { color: #40a9ff; }
        .breadcrumb span { margin: 0 8px; color: #d9d9d9; }
        .page-header-section { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); padding: 24px; margin-bottom: 24px; }
        .page-header-section h1 { font-size: 22px; color: #1f2937; margin-bottom: 8px; }
        .page-header-section p { font-size: 14px; color: #666; }
        .progress-overview { background: linear-gradient(135deg, #f6ffed 0%, #f0f7ff 100%); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
        .progress-info { display: flex; gap: 32px; flex-wrap: wrap; }
        .progress-item .number { font-size: 24px; font-weight: 600; color: #1890ff; }
        .progress-item .label { font-size: 13px; color: #666; margin-top: 4px; }
        .form-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); padding: 24px; margin-bottom: 24px; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .form-item { display: flex; flex-direction: column; gap: 8px; }
        .form-item label { font-size: 14px; color: #666; font-weight: 500; }
        .form-item input { padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
        .table-wrap { overflow-x: auto; }
        .checklist-table { width: 100%; min-width: 1280px; border-collapse: collapse; font-size: 14px; }
        .checklist-table th { background: #fafafa; padding: 12px 10px; text-align: left; font-weight: 600; color: #1f2937; border-bottom: 1px solid #e8e8e8; }
        .checklist-table td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; color: #666; vertical-align: top; }
        .checklist-table tr:hover { background: #f8fafc; }
        .center { text-align: center; width: 72px; }
        .work { line-height: 1.55; white-space: pre-line; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #1890ff; }
        .remark-input { width: 100%; min-width: 120px; padding: 8px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
        .btn-photo { padding: 6px 10px; font-size: 12px; border-radius: 4px; border: 1px solid #91d5ff; background: #e6f7ff; color: #1890ff; cursor: pointer; transition: all 0.3s; }
        .btn-photo:hover { background: #bae7ff; }
        .attach-status { margin-left: 6px; font-size: 12px; color: #999; display: inline-block; max-width: 110px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; white-space: nowrap; }
        .attach-status.ok { color: #52c41a; }
        .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e8e8e8; }
        .footer-actions .right { display: flex; gap: 12px; }
        .button { display: inline-flex; align-items: center; padding: 10px 24px; background: #1890ff; color: white; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        .button-secondary { display: inline-flex; align-items: center; padding: 10px 24px; background: white; color: #666; border: 1px solid #d9d9d9; border-radius: 6px; text-decoration: none; font-size: 14px; cursor: pointer; }
        .button-success { display: inline-flex; align-items: center; padding: 10px 24px; background: #52c41a; color: white; border-radius: 6px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
        @media (max-width: 1200px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-logo h2, .sidebar-logo p, .sidebar-item span:not(.sidebar-icon), .sidebar-arrow { display: none; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>认定工作流程</h2><p>系统原型</p></div>
            <div class="sidebar-item" onclick="window.location.href='数据面板.html'"><div class="sidebar-item-content"><span class="sidebar-icon">📊</span><span>数据面板</span></div></div>
            <div class="sidebar-item" id="projectMenu"><div class="sidebar-item-content"><span class="sidebar-icon">📁</span><span>任务管理</span></div><span class="sidebar-arrow">▶</span></div>
            <div class="sidebar-sublist" id="projectSubmenu">
                <div class="sidebar-subitem" onclick="window.location.href='项目管理首页.html'"><span>📋</span> 任务准备</div>
                <div class="sidebar-subitem" onclick="window.location.href='我要下单.html'"><span>🛒</span> 我要下单</div>
                <div class="sidebar-subitem" id="archiveMenu" onclick="toggleArchiveSubmenu(event)"><span>📦</span> 任务档案<span class="sidebar-arrow" style="margin-left:auto;">▶</span></div>
                <div class="sidebar-sublist" id="archiveSubmenu">
                    <div class="sidebar-subitem" onclick="window.location.href='考试材料.html'" style="padding-left:56px;"><span>📝</span> 考试材料</div>
                    <div class="sidebar-subitem" onclick="window.location.href='考场资料.html'" style="padding-left:56px;"><span>🏫</span> 考场资料</div>
                    <div class="sidebar-subitem" onclick="window.location.href='考生资料.html'" style="padding-left:56px;"><span>👤</span> 考生资料</div>
                </div>
            </div>
            <div class="sidebar-item active expanded" id="processMenu"><div class="sidebar-item-content"><span class="sidebar-icon">📋</span><span>认定流程</span></div><span class="sidebar-arrow">▶</span></div>
            <div class="sidebar-sublist expanded" id="processSubmenu">
                <div class="sidebar-subitem" onclick="window.location.href='任务选择.html'"><span>🏠</span> 任务选择</div>
                <div class="sidebar-subitem" onclick="window.location.href='认定流程首页.html'"><span>📌</span> 流程首页</div>
                <div class="sidebar-subitem" onclick="window.location.href='认定筹备.html'"><span>🔧</span> 认定筹备</div>
                <div class="sidebar-subitem" onclick="window.location.href='认定前.html'"><span>📅</span> 认定前</div>
                <div class="sidebar-subitem" onclick="window.location.href='理论笔试.html'"><span>📝</span> 理论笔试</div>
                <div class="sidebar-subitem active" onclick="window.location.href='实操考试.html'"><span>🔨</span> 实操考试</div>
                <div class="sidebar-subitem" onclick="window.location.href='认定归档.html'"><span>📦</span> 认定归档</div>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <h1>实操考试现场工作检查清单</h1>
                <div class="header-user"><span>👤 管理员</span><span>|</span><span>2026-04-29</span></div>
            </div>
            <div class="content">
                <div class="breadcrumb"><a href="任务选择.html">↩ 项目选择</a><span>/</span><a href="认定流程首页.html">认定流程</a><span>/</span><a href="实操考试.html">实操考试</a><span>/</span><span>现场工作检查清单</span></div>
                <div class="page-header-section">
                    <h1>📋 实操考试现场工作检查清单</h1>
                    <p>参考理论考试现场工作检查清单页面样式，按实操检查项逐条确认并留痕。</p>
                </div>
                <div class="progress-overview">
                    <div class="progress-info">
                        <div class="progress-item"><div class="number" id="total">20</div><div class="label">检查项总数</div></div>
                        <div class="progress-item"><div class="number" id="checked">0</div><div class="label">已勾选</div></div>
                        <div class="progress-item"><div class="number" id="done">0</div><div class="label">已完成</div></div>
                        <div class="progress-item"><div class="number" id="undone">0</div><div class="label">未完成</div></div>
                    </div>
                </div>
                <div class="form-container">
                    <div class="form-grid">
                        <div class="form-item"><label>项目名称</label><input type="text" value="20250517来宾银海铝铝电解槽操作工技师正考"></div>
                        <div class="form-item"><label>时间</label><input type="text" value="2025.5.17"></div>
                        <div class="form-item"><label>检查日期</label><input type="date" value="2025-05-17"></div>
                    </div>
                    <div class="table-wrap">
                        <table class="checklist-table">
                            <thead>
                                <tr>
                                    <th style="width:52px;">序号</th><th style="width:96px;">项次</th><th style="width:120px;">阶段</th><th style="width:240px;">检查节点</th><th>工作内容</th><th class="center">已完成</th><th class="center">未完成</th><th style="width:200px;">现场附件</th><th style="width:140px;">备注</th>
                                </tr>
                            </thead>
                            <tbody id="rows"></tbody>
                        </table>
                    </div>
                    <div class="form-grid" style="margin-top: 20px;">
                        <div class="form-item"><label>检查人</label><input type="text" placeholder="检查人："></div>
                        <div class="form-item"><label>内督</label><input type="text" placeholder="内督："></div>
                        <div class="form-item"><label>日期</label><input type="date"></div>
                    </div>
                    <div class="footer-actions">
                        <a class="button-secondary" href="实操考试.html">返回实操考试</a>
                        <div class="right">
                            <button class="button-secondary" onclick="saveDraft()">保存草稿</button>
                            <button class="button-success" onclick="submitForm()">提交清单</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const checklistRows = [
            ['认定中','实操考试','考前操作','1、考前提前将考评员需要用的文具：纸、笔、夹板，提醒考评员评分细则及注意步长扣分'],
            ['认定中','实操考试','考前操作','2、考场提前做好警戒线安排'],
            ['认定中','实操考试','考前操作','3、考试现场的所有工作人员需要佩戴证卡，考生必须穿戴好劳保用品'],
            ['认定中','实操考试','考前操作','3、现场工作人员须维护好现场纪律，不到考试时间不允许上场考试，非相关考场人员不可随意进入考场'],
            ['认定中','实操考试','考前操作','4、实操考试现场至少有2个或者2个以上摄像头全程-全景拍摄'],
            ['认定中','实操考试','考前操作','5、实操考试时间由考评员根据国标的要求执行'],
            ['认定中','实操考试','开考实操 试卷开封','考前15分钟拆封试卷袋，并分发试卷1张、评分表3份给考生按要求填写（考前可交由考评员分发试卷）\n在摄像头前，试卷拆封前应向考生亮明封装完好情况，随机叫2-3名考生签字确认，开封前拿密封试卷袋在摄像机前展示至少五秒，报告分发试卷，提醒考生先把个人信息填写完整'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','1、实操考试按3评1实行考评，3名考评员分别给考生同时打分并在相应评分表按步长扣分、打分签名'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','2、成绩汇总表需要3名考评员同时签名'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','3、每个考生考试完成需上交试卷、成绩汇总表、评分表，统分人收到试卷后立即检查考生签名是否完整，试卷是否齐全后要求考生签退完方可离开考场'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','4、统分人根据成绩汇总表上考评员签名的顺序、题目次序依次排放，核实扣分项及得分是否准确，评分表汇总，再根据汇总表考评员编号对应分数抄至成绩汇总表，统计最终得分，试卷按准考证号顺序依次排序'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','5、统分人应分工配合，安排1人交卷检查核实考生签名情况及按考评员顺序排放试卷，一人统分，考务二次检查并现场签名收集试卷'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','6、考务需要在每张评分表和成绩汇总表上签名，并检查本场试卷是否齐全（包含缺考人员试卷）'],
            ['认定中','实操考试','试卷及评分表填写及评分要求（含考评人员签名要求）','7、考试结束后合格情况反馈（考试报名人数，实考人数，合格人数，不合格人数，通过率）'],
            ['认定中','临时情况处理','缺考人员','登记缺考人员，登记：名字+准考证后4位数'],
            ['认定中','临时情况处理','考生资料','考生资料（认定登记表、身份证复印件、工作证明、上一等级证书）现场备查'],
            ['认定中','临时情况处理','试卷评分表、简况表','要与系统上的安排一致，如若有不同第一时间要与现场负责人进行沟通调整'],
            ['认定中','临时情况处理','外督关系维护','考场应规范有序，如若有特殊情况必须内督与外督进行沟通解决，有必要向主管部门报告，得到批准后方可实施补救方案'],
            ['认定中','考务文件填写','—','1、现场填写相应考务文件、成绩花名册、确认表，对应相关考评员签字'],
            ['认定中','考务文件填写','—','2、检查考场签到表是否完整，考务文件是否齐全']
        ];

        function renderRows() {
            const tbody = document.getElementById('rows');
            tbody.innerHTML = checklistRows.map((r, idx) => {
                const i = idx + 1;
                const needAttachment = i <= 6;
                const attachmentCell = needAttachment
                    ? `<button class="btn-photo" type="button" onclick="openAttachment(${i})">上传图片</button><input id="file-${i}" type="file" accept="image/*" style="display:none" onchange="onAttachmentChange(${i},this)"><span id="attach-${i}" class="attach-status">未上传</span>`
                    : '<span style="color:#bfbfbf;">—</span>';
                return `<tr>
                    <td>${i}</td><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="work">${r[3]}</td>
                    <td class="center"><input type="checkbox" class="done" data-row="${i}" onchange="togglePair(${i},this)"></td>
                    <td class="center"><input type="checkbox" class="undone" data-row="${i}" onchange="togglePair(${i},this)"></td>
                    <td>${attachmentCell}</td><td><input class="remark-input" type="text" placeholder="备注"></td>
                </tr>`;
            }).join('');
        }

        function toggleArchiveSubmenu(event) {
            event.stopPropagation();
            const archiveMenu = document.getElementById('archiveMenu');
            const archiveSubmenu = document.getElementById('archiveSubmenu');
            archiveMenu.classList.toggle('expanded');
            archiveSubmenu.classList.toggle('expanded');
        }
        document.getElementById('projectMenu').addEventListener('click', function() { this.classList.toggle('expanded'); document.getElementById('projectSubmenu').classList.toggle('expanded'); });
        document.getElementById('processMenu').addEventListener('click', function() { this.classList.toggle('expanded'); document.getElementById('processSubmenu').classList.toggle('expanded'); });

        function togglePair(row, el) {
            const done = document.querySelector('.done[data-row="' + row + '"]');
            const undone = document.querySelector('.undone[data-row="' + row + '"]');
            if (el === done && done.checked) undone.checked = false;
            if (el === undone && undone.checked) done.checked = false;
            updateStats();
        }
        function updateStats() {
            let checked = 0, done = 0, undone = 0;
            for (let i = 1; i <= 20; i++) {
                const d = document.querySelector('.done[data-row="' + i + '"]');
                const u = document.querySelector('.undone[data-row="' + i + '"]');
                if (d && d.checked) { checked++; done++; } else if (u && u.checked) { checked++; undone++; }
            }
            document.getElementById('checked').textContent = checked;
            document.getElementById('done').textContent = done;
            document.getElementById('undone').textContent = undone;
        }
        function openAttachment(row) { const fileInput = document.getElementById('file-' + row); if (fileInput) fileInput.click(); }
        function onAttachmentChange(row, input) {
            const status = document.getElementById('attach-' + row);
            if (!status) return;
            if (input.files && input.files.length > 0) { status.textContent = '已上传：' + input.files[0].name; status.classList.add('ok'); }
            else { status.textContent = '未上传'; status.classList.remove('ok'); }
        }
        function validateRequiredPhotos() {
            for (let i = 1; i <= 6; i++) {
                const input = document.getElementById('file-' + i);
                if (!input || !input.files || input.files.length === 0) return false;
            }
            return true;
        }
        function saveDraft() {
            if (!validateRequiredPhotos()) { showToast('保存草稿前，请先上传序号1-6的现场图片附件'); return; }
            showToast('草稿已保存');
        }
        function submitForm() {
            if (parseInt(document.getElementById('checked').textContent, 10) < 20) { showToast('请先完成20项勾选'); return; }
            if (!validateRequiredPhotos()) { showToast('序号1-6需上传现场图片附件后才能提交'); return; }
            showToast('提交成功');
            setTimeout(() => { window.location.href = '实操考试.html'; }, 1200);
        }
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:6px;font-size:14px;z-index:9999;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 1800);
        }

        renderRows();
    </script>
<script src="common.js"></script>
</body>
</html>
