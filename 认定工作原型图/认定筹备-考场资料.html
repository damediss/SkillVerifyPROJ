<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认定筹备 · 考场配置 - 认定工作流程</title>
    <link rel="stylesheet" href="common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; flex-shrink: 0; overflow-y: auto; }
        .sidebar-logo { padding: 0 16px 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; }
        .sidebar-logo h2 { font-size: 16px; font-weight: 600; }
        .sidebar-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-item-content { display: flex; align-items: center; gap: 10px; }
        .sidebar-icon { width: 20px; text-align: center; }
        .sidebar-arrow { font-size: 12px; color: #bfbfbf; }
        .sidebar-item.expanded .sidebar-arrow { transform: rotate(90deg); }
        .sidebar-sublist { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .sidebar-sublist.expanded { max-height: 1200px; }
        .sidebar-subitem { padding: 10px 16px 10px 46px; cursor: pointer; font-size: 14px; color: #595959; display: flex; gap: 8px; }
        .sidebar-subitem:hover { background: #f5f5f5; color: #1890ff; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 64px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .breadcrumb { font-size: 13px; color: #999; margin-bottom: 16px; }
        .breadcrumb a { color: #1890ff; text-decoration: none; }
        .breadcrumb span { margin: 0 8px; color: #d9d9d9; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 10px; }
        .muted { color:#666; font-size:13px; }

        .toolbar { display:flex; gap:10px; align-items:center; justify-content: space-between; flex-wrap: wrap; }
        .toolbar-left { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
        .btn { border: 1px solid #e5e7eb; background: #fff; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; }
        .btn.primary { background:#1890ff; color:#fff; border-color: rgba(24,144,255,.25); }
        .btn.ghost { background: rgba(0,0,0,.04); }
        .btn:disabled { opacity:.55; cursor:not-allowed; }
        .input { border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; font-size: 13px; min-width: 240px; }
        .select { border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; font-size: 13px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; text-align: left; font-size: 13px; vertical-align: middle; }
        th { color: #666; background: #fafafa; font-weight: 500; }
        .tag { font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(0,0,0,.10); background: rgba(0,0,0,.03); color: #64748b; display: inline-flex; align-items: center; }
        .tag.ok { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.22); color: #10b981; }
        .tag.warn { background: rgba(245,158,11,.14); border-color: rgba(245,158,11,.24); color: #f59e0b; }

        .op { display:flex; gap: 8px; align-items:center; }
        .link { border:none; background:transparent; color:#1890ff; cursor:pointer; padding:0; font-size: 13px; }
        .link.danger { color:#ef4444; }

        /* Modal */
        .mask { position: fixed; inset: 0; background: rgba(0,0,0,.38); display: none; align-items: center; justify-content: center; padding: 20px; }
        .mask.show { display: flex; }
        .modal { width: min(980px, 100%); background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
        .modal-head { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
        .modal-head h3 { font-size: 15px; }
        .modal-body { padding: 16px; max-height: 70vh; overflow: auto; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 12px; color: #64748b; }
        .text { border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 10px; font-size: 13px; }
        .modal-foot { padding: 14px 16px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #f0f0f0; }
        .hint { font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-logo"><h2>认定工作流程</h2><p>系统原型</p></div>
        <div class="sidebar-item" onclick="window.location.href='数据面板.html'">
            <div class="sidebar-item-content"><span class="sidebar-icon">📊</span><span>数据面板</span></div>
        </div>
        <div class="sidebar-item expanded" id="projectMenu">
            <div class="sidebar-item-content"><span class="sidebar-icon">📁</span><span>任务管理</span></div>
            <span class="sidebar-arrow">▶</span>
        </div>
        <div class="sidebar-sublist expanded" id="projectSubmenu">
            <div class="sidebar-subitem" onclick="window.location.href='项目管理首页.html'"><span>📋</span> 任务准备</div>
            <div class="sidebar-subitem" onclick="window.location.href='我要下单.html'"><span>🛒</span> 我要下单</div>
            <div class="sidebar-subitem" id="archiveMenu" onclick="toggleArchiveSubmenu(event)">
                <span>📦</span> 任务档案<span class="sidebar-arrow" style="margin-left:auto">▶</span>
            </div>
            <div class="sidebar-sublist" id="archiveSubmenu">
                <div class="sidebar-subitem" onclick="window.location.href='考试材料.html'" style="padding-left:56px"><span>📝</span> 考试材料</div>
                <div class="sidebar-subitem" onclick="window.location.href='考场资料.html'" style="padding-left:56px"><span>🏫</span> 考场资料</div>
                <div class="sidebar-subitem" onclick="window.location.href='考生资料.html'" style="padding-left:56px"><span>👤</span> 考生资料</div>
            </div>
        </div>
        <div class="sidebar-item expanded" id="processMenu">
            <div class="sidebar-item-content"><span class="sidebar-icon">📋</span><span>认定流程</span></div>
            <span class="sidebar-arrow">▶</span>
        </div>
        <div class="sidebar-sublist expanded" id="processSubmenu"></div>
    </div>
    <div class="main-content">
        <div class="header"><h1>认定筹备 · 考场配置</h1><span style="color:#666;font-size:14px;">👤 管理员</span></div>
        <div class="content">
            <div class="breadcrumb">
                <a href="任务选择.html">项目选择</a><span>/</span><span>认定流程</span><span>/</span><span>认定筹备</span><span>/</span><span>考场配置</span>
            </div>
            <div class="card">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="btn primary" id="btnAdd">➕ 新建考场</button>
                        <button class="btn" id="btnImport">📥 从考场库调用</button>
                        <button class="btn ghost" id="btnReset">♻️ 清空本任务配置</button>
                    </div>
                    <div class="toolbar-left">
                        <select class="select" id="typeFilter">
                            <option value="all">全部类型</option>
                            <option value="理论">理论</option>
                            <option value="实操">实操</option>
                        </select>
                        <input class="input" id="kw" placeholder="搜索考场名称/地址/备案号" />
                    </div>
                </div>
                <p class="muted" style="margin-top:10px;">
                    本页用于配置当前任务的<strong>考场信息</strong>与<strong>场次类型</strong>（理论/实操）。支持手动新建，也可从「考场信息」库调用后再补充任务侧信息（如考场分配、联系人等）。
                </p>
            </div>

            <div class="card">
                <h2>🏫 已配置考场</h2>
                <table>
                    <thead>
                        <tr>
                            <th>考场名称</th>
                            <th>类型</th>
                            <th>地址</th>
                            <th>考位</th>
                            <th>备案号</th>
                            <th>联系人</th>
                            <th>电话</th>
                            <th style="width:120px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
                <div class="hint" id="emptyHint" style="display:none; padding:14px 6px;">暂无配置数据。请点击“新建考场”或“从考场库调用”。</div>
            </div>
        </div>
    </div>
</div>
<script>
function toggleArchiveSubmenu(e) {
    e.stopPropagation();
    const m = document.getElementById('archiveMenu');
    const s = document.getElementById('archiveSubmenu');
    const ar = m && m.querySelector('.sidebar-arrow');
    if (!m || !s) return;
    m.classList.toggle('expanded');
    s.classList.toggle('expanded');
    if (ar) ar.style.transform = m.classList.contains('expanded') ? 'rotate(90deg)' : 'rotate(0deg)';
}
</script>
<script src="common.js"></script>
<script>
    const STORAGE_KEY = 'prep_venue_config_v1';

    const venueLib = [
        { name: '广西技师学院考点', addr: '南宁市西乡塘区', seats: 120, code: 'GX-KD-001', state: '在用' },
        { name: '柳州职业技术学院考点', addr: '柳州市鱼峰区', seats: 80, code: 'GX-KD-014', state: '在用' },
        { name: '桂林市公共实训基地', addr: '桂林市临桂区', seats: 60, code: 'GX-KD-022', state: '维护中' }
    ];

    function uuid() {
        return 'v_' + Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function load() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return [];
            const v = JSON.parse(raw);
            return Array.isArray(v) ? v : [];
        } catch {
            return [];
        }
    }

    function save(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function escapeHtml(s) {
        return String(s ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function toast(msg) {
        const el = document.createElement('div');
        el.className = 'toast';
        el.textContent = msg;
        el.style.position = 'fixed';
        el.style.right = '18px';
        el.style.bottom = '18px';
        el.style.padding = '10px 12px';
        el.style.background = 'rgba(2,6,23,.82)';
        el.style.color = '#fff';
        el.style.fontSize = '12px';
        el.style.zIndex = '9999';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1400);
    }

    function render() {
        const list = load();
        const kw = (document.getElementById('kw').value || '').trim().toLowerCase();
        const type = document.getElementById('typeFilter').value;

        const filtered = list.filter((x) => {
            const matchKw = !kw || [x.name, x.addr, x.code].some((s) => (s || '').toLowerCase().includes(kw));
            const matchType = type === 'all' || x.type === type;
            return matchKw && matchType;
        });

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        document.getElementById('emptyHint').style.display = list.length ? 'none' : 'block';

        filtered.forEach((x) => {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + escapeHtml(x.name) + '</td>' +
                '<td><span class="tag ' + (x.type === '理论' ? 'ok' : 'warn') + '">' + escapeHtml(x.type) + '</span></td>' +
                '<td>' + escapeHtml(x.addr) + '</td>' +
                '<td>' + escapeHtml(x.seats) + '</td>' +
                '<td><span style="font-family:var(--mono); font-size:12px;">' + escapeHtml(x.code) + '</span></td>' +
                '<td>' + escapeHtml(x.contact || '-') + '</td>' +
                '<td>' + escapeHtml(x.phone || '-') + '</td>' +
                '<td><div class="op">' +
                    '<button class="link" data-act="edit">编辑</button>' +
                    '<button class="link danger" data-act="del">移除</button>' +
                '</div></td>';
            tr.querySelector('[data-act="edit"]').addEventListener('click', () => openEdit(x.id));
            tr.querySelector('[data-act="del"]').addEventListener('click', () => removeOne(x.id));
            tbody.appendChild(tr);
        });
    }

    function removeOne(id) {
        const next = load().filter((x) => x.id !== id);
        save(next);
        render();
        toast('已移除');
    }

    // Edit modal
    let editingId = null;
    const editMask = document.createElement('div');
    editMask.className = 'mask';
    editMask.id = 'editMask';
    editMask.innerHTML = `
        <div class="modal">
            <div class="modal-head">
                <h3 id="editTitle">新建考场</h3>
                <button class="btn" id="editClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="grid2">
                    <div class="field">
                        <label>考场名称</label>
                        <input class="text" id="fName" placeholder="如：XX考点-1号考场" />
                    </div>
                    <div class="field">
                        <label>类型（区分理论/实操）</label>
                        <select class="select" id="fType">
                            <option value="理论">理论</option>
                            <option value="实操">实操</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>地址</label>
                        <input class="text" id="fAddr" placeholder="如：南宁市XX区XX路" />
                    </div>
                    <div class="field">
                        <label>考位/工位数量</label>
                        <input class="text" id="fSeats" placeholder="如：80" />
                    </div>
                    <div class="field">
                        <label>备案号（可选）</label>
                        <input class="text" id="fCode" placeholder="如：GX-KD-001" />
                    </div>
                    <div class="field">
                        <label>状态（可选）</label>
                        <input class="text" id="fState" placeholder="如：在用 / 维护中" />
                    </div>
                    <div class="field">
                        <label>联系人（任务侧）</label>
                        <input class="text" id="fContact" placeholder="如：张老师" />
                    </div>
                    <div class="field">
                        <label>电话（任务侧）</label>
                        <input class="text" id="fPhone" placeholder="如：138xxxxxx" />
                    </div>
                </div>
                <div class="hint" style="margin-top:10px;">提示：从库调用后仍可编辑类型/联系人等任务侧信息。</div>
            </div>
            <div class="modal-foot">
                <button class="btn" id="editCancel">取消</button>
                <button class="btn primary" id="editSave">保存</button>
            </div>
        </div>
    `;
    document.body.appendChild(editMask);

    function openEdit(id) {
        const list = load();
        const cur = id ? list.find((x) => x.id === id) : null;
        editingId = id || null;
        document.getElementById('editTitle').textContent = id ? '编辑考场' : '新建考场';
        document.getElementById('fName').value = cur?.name || '';
        document.getElementById('fType').value = cur?.type || '理论';
        document.getElementById('fAddr').value = cur?.addr || '';
        document.getElementById('fSeats').value = cur?.seats ?? '';
        document.getElementById('fCode').value = cur?.code || '';
        document.getElementById('fState').value = cur?.state || '';
        document.getElementById('fContact').value = cur?.contact || '';
        document.getElementById('fPhone').value = cur?.phone || '';
        editMask.classList.add('show');
    }
    function closeEdit() {
        editMask.classList.remove('show');
        editingId = null;
    }
    editMask.addEventListener('click', (e) => { if (e.target === editMask) closeEdit(); });
    editMask.querySelector('#editClose').addEventListener('click', closeEdit);
    editMask.querySelector('#editCancel').addEventListener('click', closeEdit);

    editMask.querySelector('#editSave').addEventListener('click', () => {
        const name = document.getElementById('fName').value.trim();
        const type = document.getElementById('fType').value;
        const addr = document.getElementById('fAddr').value.trim();
        const seatsRaw = document.getElementById('fSeats').value.trim();
        const code = document.getElementById('fCode').value.trim();
        const state = document.getElementById('fState').value.trim();
        const contact = document.getElementById('fContact').value.trim();
        const phone = document.getElementById('fPhone').value.trim();
        const seats = seatsRaw ? Number(seatsRaw) : '';
        if (!name || !addr) {
            toast('请填写考场名称与地址');
            return;
        }
        const list = load();
        if (editingId) {
            const next = list.map((x) =>
                x.id === editingId ? { ...x, name, type, addr, seats, code, state, contact, phone } : x
            );
            save(next);
            toast('已保存');
        } else {
            const item = { id: uuid(), name, type, addr, seats, code, state, contact, phone, source: '手动新建' };
            save([item, ...list]);
            toast('已新增');
        }
        closeEdit();
        render();
    });

    // Library modal
    const libMask = document.createElement('div');
    libMask.className = 'mask';
    libMask.id = 'libMask';
    libMask.innerHTML = `
        <div class="modal">
            <div class="modal-head">
                <h3>从考场库调用</h3>
                <button class="btn" id="libClose">✕</button>
            </div>
            <div class="modal-body">
                <p class="hint" style="margin-bottom:10px;">库来源：<a href="考场信息管理.html" target="_blank" rel="noreferrer">考场信息管理</a>（示意数据）。勾选后点击“添加到本任务”。</p>
                <table>
                    <thead>
                        <tr>
                            <th style="width:42px;"></th>
                            <th>考点名称</th>
                            <th>地址</th>
                            <th>考位</th>
                            <th>备案号</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="libTbody"></tbody>
                </table>
            </div>
            <div class="modal-foot">
                <button class="btn" id="libCancel">取消</button>
                <button class="btn primary" id="libAdd">添加到本任务</button>
            </div>
        </div>
    `;
    document.body.appendChild(libMask);

    const libSelected = new Set();
    function openLib() {
        libSelected.clear();
        const libTbody = libMask.querySelector('#libTbody');
        libTbody.innerHTML = '';
        venueLib.forEach((x, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td><input type="checkbox" data-idx="' + idx + '"/></td>' +
                '<td>' + escapeHtml(x.name) + '</td>' +
                '<td>' + escapeHtml(x.addr) + '</td>' +
                '<td>' + escapeHtml(x.seats) + '</td>' +
                '<td><span style="font-family:var(--mono); font-size:12px;">' + escapeHtml(x.code) + '</span></td>' +
                '<td>' + escapeHtml(x.state) + '</td>';
            tr.querySelector('input').addEventListener('change', (e) => {
                const i = Number(e.target.getAttribute('data-idx'));
                if (e.target.checked) libSelected.add(i);
                else libSelected.delete(i);
            });
            libTbody.appendChild(tr);
        });
        libMask.classList.add('show');
    }
    function closeLib() { libMask.classList.remove('show'); }
    libMask.addEventListener('click', (e) => { if (e.target === libMask) closeLib(); });
    libMask.querySelector('#libClose').addEventListener('click', closeLib);
    libMask.querySelector('#libCancel').addEventListener('click', closeLib);
    libMask.querySelector('#libAdd').addEventListener('click', () => {
        const list = load();
        const existingCode = new Set(list.map((x) => x.code).filter(Boolean));
        const toAdd = Array.from(libSelected).map((i) => venueLib[i]).filter(Boolean);
        const newItems = [];
        toAdd.forEach((x) => {
            if (x.code && existingCode.has(x.code)) return;
            newItems.push({
                id: uuid(),
                name: x.name,
                addr: x.addr,
                seats: x.seats,
                code: x.code,
                state: x.state,
                type: '理论',
                contact: '',
                phone: '',
                source: '考场库调用'
            });
        });
        save([...newItems, ...list]);
        closeLib();
        render();
        toast(newItems.length ? ('已添加 ' + newItems.length + ' 个考场') : '未添加（可能已存在）');
    });

    // Wire up
    document.getElementById('btnAdd').addEventListener('click', () => openEdit(null));
    document.getElementById('btnImport').addEventListener('click', openLib);
    document.getElementById('btnReset').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        render();
        toast('已清空');
    });
    document.getElementById('kw').addEventListener('input', render);
    document.getElementById('typeFilter').addEventListener('change', render);
    render();
</script>
</body>
</html>
