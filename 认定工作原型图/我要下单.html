<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我要下单 - 认定工作流程</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.css">
    <style>
        :root {
            --primary: #1890ff;
            --primary-strong: #096dd9;
            --primary-soft: #e6f7ff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --bg: #f0f2f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }
        .container { display: flex; height: 100vh; }
        .sidebar {
            width: 220px;
            background-color: #ffffff;
            color: #1f2937;
            border-right: 1px solid #e8e8e8;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
            padding: 16px 0;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .sidebar-logo { padding: 0 16px 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; }
        .sidebar-logo h2 { font-size: 16px; font-weight: 600; }
        .sidebar-logo p { font-size: 12px; color: #8c8c8c; margin-top: 4px; }
        .sidebar-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }
        .sidebar-item:hover { background-color: #f5f5f5; }
        .sidebar-item.active { background-color: var(--primary); color: #ffffff; }
        .sidebar-item.active .sidebar-arrow { color: rgba(255, 255, 255, 0.9); }
        .sidebar-item-content { display: flex; align-items: center; gap: 10px; }
        .sidebar-icon { font-size: 16px; width: 20px; text-align: center; }
        .sidebar-arrow { font-size: 12px; transition: transform 0.3s; color: #bfbfbf; }
        .sidebar-subitem.expanded .sidebar-arrow { transform: rotate(90deg); }
        .sidebar-item.expanded .sidebar-arrow { transform: rotate(90deg); }
        .sidebar-sublist { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .sidebar-sublist.expanded { max-height: 1200px; }
        .sidebar-subitem {
            padding: 10px 16px 10px 46px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #595959;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-subitem:hover { background-color: #f5f5f5; color: #1890ff; }
        .sidebar-subitem.active {
            background-color: rgba(24, 144, 255, 0.2);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header {
            height: 64px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .header h1 { font-size: 18px; color: var(--text); }
        .header-user { display: flex; align-items: center; gap: 12px; color: #666; font-size: 14px; }
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        .breadcrumb a { color: var(--primary); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .hero-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
            border-radius: 12px;
            padding: 24px;
            color: white;
            margin-bottom: 24px;
        }
        .hero-card h2 { font-size: 20px; margin-bottom: 8px; }
        .hero-card p { font-size: 14px; opacity: 0.92; line-height: 1.6; }
        .section-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 24px;
            max-width: 720px;
        }
        .section-card h3 { font-size: 16px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; color: var(--text-muted); }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group textarea { min-height: 88px; resize: vertical; }
        .form-group.full { grid-column: 1 / -1; }
        .toolbar { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
        .button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .button:hover { background: var(--primary-strong); }
        .button-secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .button-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .toast-stack {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            min-width: 260px;
            padding: 14px 18px;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            font-size: 14px;
        }
        .toast.success { background: #166534; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <h2>认定工作流程</h2>
                <p>系统原型</p>
            </div>
            
            <!-- 数据面板 -->
            <div class="sidebar-item" onclick="window.location.href='数据面板.html'">
                <div class="sidebar-item-content">
                    <span class="sidebar-icon">📊</span>
                    <span>数据面板</span>
                </div>
            </div>
            
            <!-- 项目管理 - 可展开 -->
            <div class="sidebar-item expanded" id="projectMenu">
                <div class="sidebar-item-content">
                    <span class="sidebar-icon">📁</span>
                    <span>任务管理</span>
                </div>
                <span class="sidebar-arrow">▶</span>
            </div>
            <div class="sidebar-sublist expanded" id="projectSubmenu">
                <div class="sidebar-subitem" onclick="window.location.href='项目管理首页.html'">
                    <span>📋</span> 任务准备
                </div>
                <div class="sidebar-subitem active" onclick="window.location.href='我要下单.html'">
                    <span>🛒</span> 我要下单
                </div>
                <div class="sidebar-subitem" id="archiveMenu" onclick="toggleArchiveSubmenu(event)">
                    <span>📦</span> 任务档案
                    <span class="sidebar-arrow" style="margin-left: auto;">▶</span>
                </div>
                <div class="sidebar-sublist" id="archiveSubmenu">
                    <div class="sidebar-subitem" onclick="window.location.href='考试材料.html'" style="padding-left: 56px;">
                        <span>📝</span> 考试材料
                    </div>
                    <div class="sidebar-subitem" onclick="window.location.href='考场资料.html'" style="padding-left: 56px;">
                        <span>🏫</span> 考场资料
                    </div>
                    <div class="sidebar-subitem" onclick="window.location.href='考生资料.html'" style="padding-left: 56px;">
                        <span>👤</span> 考生资料
                    </div>
                </div>
            </div>
            
            <!-- 认定流程 - 可展开 -->
            <div class="sidebar-item" id="processMenu">
                <div class="sidebar-item-content">
                    <span class="sidebar-icon">📋</span>
                    <span>认定流程</span>
                </div>
                <span class="sidebar-arrow">▶</span>
            </div>
            <div class="sidebar-sublist" id="processSubmenu">
                <div class="sidebar-subitem" onclick="window.location.href='任务选择.html'">
                    <span>🏠</span> 任务选择
                </div>
                <div class="sidebar-subitem" onclick="window.location.href='认定流程首页.html'">
                    <span>📌</span> 流程首页
                </div>
                <div class="sidebar-subitem" onclick="window.location.href='认定筹备.html'">
                    <span>🔧</span> 认定筹备
                </div>
                <div class="sidebar-subitem" onclick="window.location.href='认定前.html'">
                    <span>📅</span> 认定前
                </div>
                <div class="sidebar-subitem" onclick="window.location.href='理论笔试.html'">
                    <span>📝</span> 理论笔试
                </div>
                <div class="sidebar-subitem" onclick="window.location.href='实操考试.html'">
                    <span>🔨</span> 实操考试
                </div>
                <div class="sidebar-subitem" onclick="window.location.href='认定归档.html'">
                    <span>📦</span> 认定归档
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <h1>我要下单</h1>
                <div class="header-user">
                    <span>👤 管理员</span>
                    <span>|</span>
                    <span>2026-04-29</span>
                </div>
            </div>
            <div class="content">
                <div class="breadcrumb">
                    <a href="数据面板.html">数据面板</a>
                    <span>/</span>
                    <a href="项目管理首页.html">项目管理</a>
                    <span>/</span>
                    <span>我要下单</span>
                </div>
                <div class="hero-card">
                    <h2>🛒 提交认定服务订单</h2>
                    <p>填写意向工种、等级与规模等信息，向服务方发起下单请求。提交后为原型演示数据，可与「项目准备」中的待接收订单联动。</p>
                </div>
                <div class="section-card">
                    <h3>订单信息</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>工种 / 职业名称</label>
                            <input type="text" id="orderJob" placeholder="例如：电工">
                        </div>
                        <div class="form-group">
                            <label>认定等级</label>
                            <select id="orderLevel">
                                <option value="">请选择</option>
                                <option value="五级">五级 / 初级工</option>
                                <option value="四级">四级 / 中级工</option>
                                <option value="三级">三级 / 高级工</option>
                                <option value="二级">二级 / 技师</option>
                                <option value="一级">一级 / 高级技师</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>计划认定人数</label>
                            <input type="number" id="orderCount" min="1" placeholder="例如：60">
                        </div>
                        <div class="form-group">
                            <label>期望开考月份</label>
                            <input type="month" id="orderMonth" value="2026-05">
                        </div>
                        <div class="form-group full">
                            <label>联系人及说明</label>
                            <textarea id="orderNote" placeholder="对接人、企业名称、特殊要求等"></textarea>
                        </div>
                    </div>
                    <div class="toolbar">
                        <button type="button" class="button button-secondary" onclick="window.location.href='项目管理首页.html'">返回项目准备</button>
                        <button type="button" class="button" onclick="submitOrder()">提交订单</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast-stack" id="toastStack"></div>
    <script>
        function toggleArchiveSubmenu(event) {
            event.stopPropagation();
            const archiveMenu = document.getElementById('archiveMenu');
            const archiveSubmenu = document.getElementById('archiveSubmenu');
            if (!archiveMenu || !archiveSubmenu) return;
            const arrow = archiveMenu.querySelector('.sidebar-arrow');
            archiveMenu.classList.toggle('expanded');
            archiveSubmenu.classList.toggle('expanded');
            if (arrow) {
                arrow.style.transform = archiveMenu.classList.contains('expanded') ? 'rotate(90deg)' : 'rotate(0deg)';
            }
        }

        function initSidebar() {
            const projectMenu = document.getElementById('projectMenu');
            const projectSubmenu = document.getElementById('projectSubmenu');
            const processMenu = document.getElementById('processMenu');
            const processSubmenu = document.getElementById('processSubmenu');
            if (!projectMenu) return;
            projectMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                projectMenu.classList.toggle('expanded');
                projectSubmenu.classList.toggle('expanded');
            });
            if (processMenu) {
                processMenu.addEventListener('click', (e) => {
                    e.stopPropagation();
                    processMenu.classList.toggle('expanded');
                    processSubmenu.classList.toggle('expanded');
                });
            }
        }

        function showToast(message, type = '') {
            const stack = document.getElementById('toastStack');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            stack.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function submitOrder() {
            const job = document.getElementById('orderJob').value.trim();
            const level = document.getElementById('orderLevel').value;
            const count = document.getElementById('orderCount').value;
            if (!job || !level || !count) {
                showToast('请填写工种、等级与人数', '');
                return;
            }
            showToast('订单已提交（原型演示）', 'success');
        }

        document.addEventListener('DOMContentLoaded', initSidebar);
    </script>
<script src="common.js"></script>
</body>
</html>
