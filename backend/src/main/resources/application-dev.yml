spring:
  datasource:
    url: jdbc:mysql://localhost:3306/skillverify?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: skillverify
    password: skillverify
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.format_sql: true
      hibernate.jdbc.time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
